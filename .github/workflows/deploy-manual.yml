# =====================================================================
# GitHub Actions: Manual Deploy — เลือก environment ได้
# =====================================================================
# ใช้สำหรับ: deploy ซ้ำ, rollback, หรือ deploy ไป staging
# เปิด GitHub → Actions → "Manual Deploy" → Run workflow
# =====================================================================

name: "🔧 Manual Deploy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "เลือก environment ที่ต้องการ deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      clean_slate:
        description: "ลบไฟล์เก่าบน server ทั้งหมดก่อน deploy (ระวัง!)"
        required: false
        default: false
        type: boolean
      skip_config:
        description: "ข้าม generate config (ใช้ config ที่อยู่ใน repo)"
        required: false
        default: false
        type: boolean

concurrency:
  group: manual-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: "📦 Deploy to ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show deploy info
        run: |
          echo "🎯 Environment: ${{ github.event.inputs.environment }}"
          echo "🧹 Clean slate: ${{ github.event.inputs.clean_slate }}"
          echo "⏭️  Skip config: ${{ github.event.inputs.skip_config }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "📝 Commit: ${{ github.sha }}"

      # ─── Generate production configs (ถ้าไม่ skip) ───────────
      - name: Generate config/database.php
        if: ${{ github.event.inputs.skip_config == 'false' }}
        run: |
          cat > config/database.php << 'PHPEOF'
          <?php
          /**
           * ศูนย์กลางการตั้งค่าฐานข้อมูล — LLW System (Production)
           * ไฟล์นี้ถูกสร้างอัตโนมัติโดย GitHub Actions
           */

          define('DB_HOST', '${{ secrets.DB_HOST }}');
          define('DB_USER', '${{ secrets.DB_USER }}');
          define('DB_PASS', '${{ secrets.DB_PASS }}');
          define('DB_NAME', '${{ secrets.DB_NAME }}');

          date_default_timezone_set('Asia/Bangkok');

          function getWfhConn(): mysqli
          {
              $conn = new mysqli(DB_HOST, DB_USER, DB_PASS, DB_NAME);
              if ($conn->connect_error) {
                  die('เชื่อมต่อฐานข้อมูลล้มเหลว: ' . $conn->connect_error);
              }
              $conn->set_charset('utf8mb4');
              return $conn;
          }

          function getPdo(): PDO
          {
              $dsn = 'mysql:host=' . DB_HOST . ';dbname=' . DB_NAME . ';charset=utf8mb4';
              try {
                  $pdo = new PDO($dsn, DB_USER, DB_PASS);
                  $pdo->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
                  $pdo->setAttribute(PDO::ATTR_DEFAULT_FETCH_MODE, PDO::FETCH_ASSOC);
                  return $pdo;
              } catch (PDOException $e) {
                  die('เชื่อมต่อฐานข้อมูลล้มเหลว: ' . $e->getMessage());
              }
          }
          PHPEOF

      - name: Generate config/db_central.php
        if: ${{ github.event.inputs.skip_config == 'false' }}
        run: |
          cat > config/db_central.php << 'PHPEOF'
          <?php
          if (!defined('DB_HOST')) define('DB_HOST', '${{ secrets.DB_HOST }}');
          if (!defined('DB_USER')) define('DB_USER', '${{ secrets.DB_USER }}');
          if (!defined('DB_PASS')) define('DB_PASS', '${{ secrets.DB_PASS }}');

          $db_central_name = '${{ secrets.DB_CENTRAL_NAME }}';

          try {
              $pdo_central = new PDO("mysql:host=" . DB_HOST . ";dbname=$db_central_name;charset=utf8mb4", DB_USER, DB_PASS);
              $pdo_central->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
              $pdo_central->setAttribute(PDO::ATTR_DEFAULT_FETCH_MODE, PDO::FETCH_ASSOC);
          } catch (PDOException $e) {
              die("Database Connection Failed (Central): " . $e->getMessage());
          }
          ?>
          PHPEOF

      - name: Generate config/db_project.php
        if: ${{ github.event.inputs.skip_config == 'false' }}
        run: |
          cat > config/db_project.php << 'PHPEOF'
          <?php
          if (!defined('DB_HOST')) define('DB_HOST', '${{ secrets.DB_HOST }}');
          if (!defined('DB_USER')) define('DB_USER', '${{ secrets.DB_USER }}');
          if (!defined('DB_PASS')) define('DB_PASS', '${{ secrets.DB_PASS }}');

          $db_project_name = '${{ secrets.DB_PROJECT_NAME }}';

          try {
              $pdo_project = new PDO("mysql:host=" . DB_HOST . ";dbname=$db_project_name;charset=utf8mb4", DB_USER, DB_PASS);
              $pdo_project->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
              $pdo_project->setAttribute(PDO::ATTR_DEFAULT_FETCH_MODE, PDO::FETCH_ASSOC);
          } catch (PDOException $e) {
              die("Database Connection Failed (Project): " . $e->getMessage());
          }

          if (!defined('TELEGRAM_TOKEN')) define('TELEGRAM_TOKEN', '${{ secrets.TELEGRAM_TOKEN }}');
          if (!defined('BOSS1_CHAT_ID')) define('BOSS1_CHAT_ID', '${{ secrets.TELEGRAM_BOSS1_CHAT_ID }}');
          ?>
          PHPEOF

      # ─── ลบไฟล์ debug ──────────────────────────────────────
      - name: Remove test/debug files
        run: |
          rm -f test_*.php fix_*.php md.txt
          echo "✅ Cleaned up test/debug files"

      # ─── FTP Deploy ─────────────────────────────────────────
      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftp
          dangerous-clean-slate: ${{ github.event.inputs.clean_slate }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.env
            **/md.txt
            **/*.md
            **/test_*.php
            **/fix_*.php

      # ─── สรุปผลลัพธ์ ─────────────────────────────────────
      - name: Deploy summary
        run: |
          echo "========================================="
          echo "✅ Deploy สำเร็จ!"
          echo "========================================="
          echo "🎯 Environment: ${{ github.event.inputs.environment }}"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 By: ${{ github.actor }}"
          echo "🕐 Time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "========================================="
